# Daily YouTube feed refresh. Requires repo secret: YOUTUBE_API_KEY.
# Non-secret defaults match env.template (not loaded in CI; set explicitly below).
name: Update YouTube feed

on:
  workflow_dispatch:
  schedule:
    # 06:15 UTC daily (~1:15am Eastern; adjust as needed)
    - cron: "15 6 * * *"

permissions:
  contents: write

concurrency:
  group: youtube-feed-update
  cancel-in-progress: true

jobs:
  update-feed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch and write data/videos.json
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          PERSON_NAME: Horace Cooper
          SEARCH_QUERY: Horace Cooper
          PERSON_NAME_VARIANTS: ""
          MAX_RESULTS: "300"
          SEARCH_PAGE_SIZE: "50"
          MAX_PAGES: "12"
          QUOTA_SOFT_LIMIT: "2000"
          ENFORCE_QUOTA_GUARD: "true"
          PUBLISHED_AFTER: ""
          PUBLISHED_BEFORE: ""
          OUTPUT_PATH: ./data/videos.json
        run: node backend/fetch-youtube-feed.mjs

      - name: Commit feed if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/videos.json
          if git diff --staged --quiet; then
            echo "No changes to videos.json"
            exit 0
          fi
          git commit -m "chore: refresh YouTube feed (automated)"
          git push
