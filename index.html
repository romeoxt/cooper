<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Latest Videos</title>
    <script>
      (function () {
        try {
          const savedTheme = localStorage.getItem("hc-theme");
          document.documentElement.setAttribute("data-theme", savedTheme || "light");
        } catch {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="intro-loader" id="intro-loader" aria-hidden="true">
      <div class="intro-mark">HC</div>
    </div>

    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="./">Horace Cooper</a>
        <div class="topbar-actions">
          <input
            id="filter-search"
            type="search"
            class="search-input"
            placeholder="Search videos..."
            aria-label="Search videos"
          />
          <button type="button" class="theme-toggle" id="theme-toggle">Dark mode</button>
          <a class="contact-link" href="./contact.html">Contact</a>
        </div>
      </div>
      <div class="chip-row" aria-label="Video filters">
        <button class="chip active" data-chip="all" type="button">All</button>
        <button class="chip" data-chip="recent" type="button">Recent</button>
        <button class="chip" data-chip="short" type="button">Short</button>
        <button class="chip" data-chip="long" type="button">Long</button>
      </div>
    </header>

    <main class="feed-page">
      <section class="results">
        <div class="status" id="status"></div>
        <div id="video-list" class="video-grid"></div>
        <div id="scroll-sentinel" class="scroll-sentinel" aria-hidden="true"></div>
      </section>
    </main>

    <footer class="site-footer compact">
      <div class="footer-inner">
        <p class="footer-note">Horace Cooper</p>
        <div class="footer-socials">
          <a class="social-icon" href="#" aria-label="YouTube">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M23 12.07c0 2.14-.17 4.28-.52 6.38a3 3 0 0 1-2.12 2.34c-2.83.78-8.36.78-8.36.78s-5.53 0-8.36-.78a3 3 0 0 1-2.12-2.34A38.7 38.7 0 0 1 1 12.07c0-2.14.17-4.28.52-6.38A3 3 0 0 1 3.64 3.35C6.47 2.57 12 2.57 12 2.57s5.53 0 8.36.78a3 3 0 0 1 2.12 2.34c.35 2.1.52 4.24.52 6.38Zm-13.2-3.89v7.78l6.74-3.89-6.74-3.89Z" fill="currentColor"/>
            </svg>
          </a>
          <a class="social-icon" href="#" aria-label="X">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18.9 2H22l-6.78 7.75L23.2 22h-6.25l-4.9-6.42L6.44 22H3.33l7.26-8.3L1 2h6.4l4.43 5.9L18.9 2Zm-1.1 18h1.72L6.42 3.9H4.57L17.8 20Z" fill="currentColor"/>
            </svg>
          </a>
          <a class="social-icon" href="#" aria-label="Instagram">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M7.5 2h9A5.5 5.5 0 0 1 22 7.5v9a5.5 5.5 0 0 1-5.5 5.5h-9A5.5 5.5 0 0 1 2 16.5v-9A5.5 5.5 0 0 1 7.5 2Zm0 2A3.5 3.5 0 0 0 4 7.5v9A3.5 3.5 0 0 0 7.5 20h9a3.5 3.5 0 0 0 3.5-3.5v-9A3.5 3.5 0 0 0 16.5 4h-9Zm10.25 1.5a1.25 1.25 0 1 1 0 2.5 1.25 1.25 0 0 1 0-2.5ZM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10Zm0 2a3 3 0 1 0 0 6 3 3 0 0 0 0-6Z" fill="currentColor"/>
            </svg>
          </a>
          <a class="social-icon" href="#" aria-label="LinkedIn">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6.94 8.5H3.56V20h3.38V8.5ZM3.35 4.94A2.03 2.03 0 1 0 7.4 5a2.03 2.03 0 0 0-4.06-.06ZM20.44 13.4c0-3.46-1.85-5.07-4.32-5.07a3.73 3.73 0 0 0-3.36 1.85V8.5H9.38V20h3.38v-6.02c0-1.58.3-3.1 2.25-3.1 1.92 0 1.95 1.79 1.95 3.2V20h3.48l.01-6.6Z" fill="currentColor"/>
            </svg>
          </a>
        </div>
      </div>
    </footer>

    <div class="video-modal" id="video-modal" aria-hidden="true">
      <button class="video-modal-close" id="video-modal-close" aria-label="Close video">
        Close
      </button>
      <div class="video-modal-content">
        <iframe
          id="video-frame"
          title="YouTube video player"
          src=""
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          referrerpolicy="strict-origin-when-cross-origin"
          allowfullscreen
        ></iframe>
      </div>
    </div>

    <script>
      window.VIDEO_FEED_URL = "./data/videos.json";
    </script>
    <script src="./theme.js" defer></script>
    <script src="./app.js" defer></script>
  </body>
</html>
